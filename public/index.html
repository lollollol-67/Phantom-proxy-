<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phantom</title>
  <script>
  (function() {
      document.title = "Study.com | Free Online Courses, Lessons & Practice";
      const iconUrl = "https://study.com/favicon.ico";
      let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
      link.type = 'image/x-icon';
      link.rel = 'shortcut icon';
      link.href = iconUrl;
      document.head.appendChild(link);

      const metaTags = [
          { name: "description", content: "Take online courses on Study.com that are fun and effective. Help your kids with their biology and math homework." },
          { name: "keywords", content: "education, flashcards, study, math help, biology, science lessons" },
          { name: "theme-color", content: "#ffffff" } 
      ];

      metaTags.forEach(tag => {
          let element = document.querySelector(`meta[name="${tag.name}"]`) || document.createElement('meta');
          element.name = tag.name;
          element.content = tag.content;
          document.head.appendChild(element);
      });
  })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- Load BareMux and Phantom config before app scripts -->
  <script src="/baremux/index.js"></script>
  <script src="/phantom.config.js"></script>
</head>
<body>

  <!-- Background orbs -->
  <div class="bg-mesh">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <span class="top-brand">Phantom</span>

  <div class="status-pill">
    <span class="status-dot"></span>
    online
  </div>

  <!-- Main page (hidden when proxy frame opens) -->
  <main class="page" id="phantom-page">

    <div class="ghost-wrap">
      <svg class="ghost-svg" viewBox="0 0 100 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 5C27.9 5 10 23.4 10 46v54l13-10 13 10 13-10 13 10 13-10 13 10V46C88 23.4 70.1 5 50 5Z"
              fill="url(#ghost-grad)" opacity="0.95"/>
        <circle cx="37" cy="46" r="7" fill="#0d0d1f"/>
        <circle cx="63" cy="46" r="7" fill="#0d0d1f"/>
        <circle cx="39" cy="44" r="2.5" fill="white" opacity="0.6"/>
        <circle cx="65" cy="44" r="2.5" fill="white" opacity="0.6"/>
        <defs>
          <linearGradient id="ghost-grad" x1="10" y1="5" x2="88" y2="110" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#c4b5fd"/>
            <stop offset="100%" stop-color="#7b5fff"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <h1 class="wordmark">Phantom</h1>
    <p class="tagline">browse without a trace</p>

    <div class="search-wrap">
      <form id="phantom-form" autocomplete="off">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            id="phantom-address"
            type="text"
            placeholder="Enter URL or search the web..."
            spellcheck="false"
            autocorrect="off"
            autocomplete="off"
          />
          <button class="go-btn" type="submit">Go →</button>
        </div>
      </form>

      <div class="error-wrap">
        <span id="phantom-error"></span>
      </div>
    </div>

  </main>

  <footer>
    <span>Phantom © 2025</span>
  </footer>

  <script src="register-sw.js"></script>
  <script src="search.js"></script>
  <script src="app.js"></script>

</body>
</html>
